<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Budget">
<meta name="theme-color" content="#0f0f0f">
<title>Budget</title>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222222;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0ede8;
    --text2: #888880;
    --text3: #555550;
    --accent: #c8f060;
    --danger: #ff6b6b;
    --radius: 14px;
    --radius-sm: 9px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif; overscroll-behavior: none; }
  body { display: flex; flex-direction: column; }

  .screen { display: none; flex-direction: column; height: 100%; overflow: hidden; }
  .screen.active { display: flex; }

  /* ── MAIN SCREEN ── */
  .main-header {
    flex: 0 0 auto;
    display: flex;
    align-items: flex-end;
    justify-content: flex-end;
    padding: 56px 20px 0;
  }
  .icon-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 6px;
    color: var(--text3);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s;
  }
  .icon-btn:active { color: var(--text2); }

  .main-top {
    flex: 0 0 auto;
    padding: 16px 24px 24px;
    text-align: center;
  }
  .month-label {
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .remaining-value {
    font-size: 56px;
    font-weight: 300;
    letter-spacing: -0.03em;
    line-height: 1;
    color: var(--text);
    transition: color 0.3s;
  }
  .remaining-value.negative { color: var(--danger); }
  .remaining-sub {
    font-size: 13px;
    color: var(--text3);
    margin-top: 8px;
  }
  .progress-bar-wrap { padding: 0 24px 24px; }
  .progress-bg { height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; }
  .progress-fill.danger { background: var(--danger); }

  .form-area { flex: 1 1 auto; overflow-y: auto; padding: 0 20px 40px; }
  .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 12px; }
  .field-label { font-size: 11px; letter-spacing: 0.08em; color: var(--text3); text-transform: uppercase; margin-bottom: 8px; }

  input[type="text"], input[type="number"] {
    width: 100%;
    background: var(--surface2);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 17px;
    padding: 12px 14px;
    outline: none;
    font-family: inherit;
    -webkit-appearance: none;
    appearance: none;
  }
  input[type="number"] { font-variant-numeric: tabular-nums; }
  input::placeholder { color: var(--text3); }
  input:focus { border-color: var(--accent); }

  .btn-submit {
    width: 100%; padding: 16px;
    background: var(--accent); color: #0f0f0f;
    font-size: 16px; font-weight: 600; font-family: inherit;
    border: none; border-radius: var(--radius);
    cursor: pointer; margin-bottom: 10px;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn-submit:active { opacity: 0.85; transform: scale(0.98); }
  .btn-outline {
    width: 100%; padding: 14px;
    background: transparent; color: var(--text2);
    font-size: 15px; font-family: inherit;
    border: 0.5px solid var(--border2); border-radius: var(--radius);
    cursor: pointer; transition: background 0.15s, transform 0.1s;
  }
  .btn-outline:active { background: var(--surface); transform: scale(0.98); }

  /* ── HISTORY SCREEN ── */
  .page-header {
    flex: 0 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    padding: 58px 20px 16px;
    border-bottom: 0.5px solid var(--border);
  }
  .page-title { font-size: 20px; font-weight: 500; }
  .back-btn {
    font-size: 15px; color: var(--accent);
    background: none; border: none; cursor: pointer;
    padding: 4px 0; font-family: inherit;
  }
  .back-btn:active { opacity: 0.7; }

  .history-list { flex: 1 1 auto; overflow-y: auto; padding: 0 20px 40px; }
  .history-item { padding: 14px 0; border-bottom: 0.5px solid var(--border); }
  .hi-row1 { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
  .hi-desc { font-size: 15px; font-weight: 500; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .hi-amount { font-size: 15px; font-weight: 500; color: var(--danger); white-space: nowrap; }
  .hi-row2 { display: flex; justify-content: space-between; margin-top: 4px; }
  .hi-date { font-size: 12px; color: var(--text3); }
  .hi-left { font-size: 12px; color: var(--text2); }
  .hi-actions { display: flex; gap: 8px; margin-top: 8px; }
  .hi-action-btn {
    font-size: 12px; padding: 4px 10px; border-radius: 20px;
    background: var(--surface2); border: 0.5px solid var(--border2);
    color: var(--text2); cursor: pointer; font-family: inherit;
    transition: opacity 0.15s;
  }
  .hi-action-btn.del { color: var(--danger); border-color: rgba(255,107,107,0.3); }
  .hi-action-btn:active { opacity: 0.6; }
  .edit-form { margin-top: 10px; padding: 12px; background: var(--surface2); border-radius: var(--radius-sm); display: none; }
  .edit-form input { margin-bottom: 8px; font-size: 15px; }
  .edit-form-btns { display: flex; gap: 8px; }
  .edit-form-btns button { flex: 1; }
  .empty-state { text-align: center; color: var(--text3); font-size: 14px; padding: 60px 0; line-height: 1.6; }

  /* ── SETTINGS SCREEN ── */
  .settings-body { flex: 1 1 auto; overflow-y: auto; padding: 8px 20px 40px; }
  .settings-group { margin-bottom: 28px; }
  .settings-group-title {
    font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text3); margin-bottom: 4px; padding: 0 4px;
  }
  .settings-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .settings-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; padding: 14px 16px;
    border-bottom: 0.5px solid var(--border);
  }
  .settings-row:last-child { border-bottom: none; }
  .settings-row-label { font-size: 15px; color: var(--text2); }
  .settings-row-hint { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .settings-row input { width: 110px; text-align: right; font-size: 15px; background: transparent; border-color: var(--border2); }
  .settings-row input:focus { border-color: var(--accent); }
  .btn-settings-save {
    width: 100%; padding: 15px;
    background: var(--accent); color: #0f0f0f;
    font-size: 16px; font-weight: 600; font-family: inherit;
    border: none; border-radius: var(--radius);
    cursor: pointer; margin-top: 4px;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn-settings-save:active { opacity: 0.85; transform: scale(0.98); }
  .reset-day-info {
    font-size: 12px; color: var(--text3); text-align: center;
    padding: 8px 0 0; line-height: 1.5;
  }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 40px; left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--surface); border: 0.5px solid var(--border2);
    border-radius: 24px; padding: 9px 18px;
    font-size: 13px; color: var(--text2);
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    white-space: nowrap; z-index: 99;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- MAIN SCREEN -->
<div id="screen-main" class="screen active">
  <div class="main-header">
    <button class="icon-btn" onclick="showScreen('settings')" aria-label="Settings">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>
  <div class="main-top">
    <div class="month-label" id="month-label">June 2026</div>
    <div class="remaining-value" id="remaining-display">£0.00</div>
    <div class="remaining-sub" id="remaining-sub">remaining</div>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bg"><div class="progress-fill" id="progress-fill" style="width:100%"></div></div>
  </div>
  <div class="form-area">
    <div class="card">
      <div class="field-label">Description</div>
      <input type="text" id="desc-input" placeholder="e.g. Coffee, Groceries…" autocomplete="off" />
    </div>
    <div class="card">
      <div class="field-label">Value (£)</div>
      <input type="number" id="amount-input" placeholder="0.00" min="0" step="0.01" inputmode="decimal" />
    </div>
    <button class="btn-submit" onclick="submitPurchase()">Submit</button>
    <button class="btn-outline" onclick="showScreen('history')">History</button>
  </div>
</div>

<!-- HISTORY SCREEN -->
<div id="screen-history" class="screen">
  <div class="page-header">
    <button class="back-btn" onclick="showScreen('main')">← Back</button>
    <div class="page-title">History</div>
    <div style="width:50px;"></div>
  </div>
  <div class="history-list" id="history-list"></div>
</div>

<!-- SETTINGS SCREEN -->
<div id="screen-settings" class="screen">
  <div class="page-header">
    <button class="back-btn" onclick="showScreen('main')">← Back</button>
    <div class="page-title">Settings</div>
    <div style="width:50px;"></div>
  </div>
  <div class="settings-body">
    <div class="settings-group">
      <div class="settings-group-title">Budget</div>
      <div class="settings-card">
        <div class="settings-row">
          <div>
            <div class="settings-row-label">Monthly budget (£)</div>
            <div class="settings-row-hint">Your total allowance each period</div>
          </div>
          <input type="number" id="budget-input" placeholder="0.00" min="0" step="0.01" inputmode="decimal" />
        </div>
        <div class="settings-row">
          <div>
            <div class="settings-row-label">Reset day</div>
            <div class="settings-row-hint">Day of month budget resets (1–28)</div>
          </div>
          <input type="number" id="reset-day-input" placeholder="1" min="1" max="28" step="1" inputmode="numeric" />
        </div>
      </div>
      <div class="reset-day-info" id="reset-day-info"></div>
    </div>
    <button class="btn-settings-save" onclick="saveSettings()">Save Settings</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── DATA MIGRATION ──
// Migrates from any previous key (budget_v1, budget_v2) into budget_v4
const KEY = 'budget_v4';
const OLD_KEYS = ['budget_v3', 'budget_v2', 'budget_v1'];

let data = { budget: 0, resetDay: 1, entries: [], lastCheckedPeriod: '' };

function load() {
  try {
    const r = localStorage.getItem(KEY);
    if (r) {
      data = JSON.parse(r);
      if (!data.resetDay) data.resetDay = 1;
      if (!data.lastCheckedPeriod) data.lastCheckedPeriod = '';
      return;
    }
  } catch(e) {}
  // Try migrating from old keys
  for (const oldKey of OLD_KEYS) {
    try {
      const r = localStorage.getItem(oldKey);
      if (r) {
        const old = JSON.parse(r);
        data.budget = old.budget || 0;
        data.entries = old.entries || [];
        data.resetDay = 1;
        data.lastCheckedPeriod = '';
        save();
        break;
      }
    } catch(e) {}
  }
}

function save() {
  try { localStorage.setItem(KEY, JSON.stringify(data)); } catch(e) {}
}

// ── PERIOD LOGIC (supports any reset day) ──
// A "period key" is YYYY-MM-DD of the period start date

function getPeriodStart(fromDate) {
  const d = fromDate ? new Date(fromDate) : new Date();
  const day = d.getDate();
  const rd = data.resetDay || 1;
  let y = d.getFullYear(), m = d.getMonth();
  if (day >= rd) {
    return new Date(y, m, rd);
  } else {
    if (m === 0) { y--; m = 11; } else { m--; }
    return new Date(y, m, rd);
  }
}

function getPrevPeriodStart() {
  const cur = getPeriodStart();
  const d = new Date(cur);
  if (d.getMonth() === 0) { d.setFullYear(d.getFullYear()-1); d.setMonth(11); }
  else { d.setMonth(d.getMonth()-1); }
  return d;
}

function periodKey(d) {
  const dt = d || getPeriodStart();
  return dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0') + '-' + String(dt.getDate()).padStart(2,'0');
}

function periodLabel(d) {
  const dt = d || getPeriodStart();
  const rd = data.resetDay || 1;
  // End of period = day before next reset
  const end = new Date(dt);
  end.setMonth(end.getMonth()+1);
  end.setDate(end.getDate()-1);
  if (rd === 1) {
    return dt.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
  }
  return dt.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }) +
    ' – ' + end.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

function currentEntries() {
  const pk = periodKey();
  return data.entries.filter(e => e.period === pk);
}

function entriesForPeriod(pk) {
  return data.entries.filter(e => e.period === pk);
}

function calcRemaining() {
  const spent = currentEntries().reduce((s,e) => s + e.amount, 0);
  return Math.round((data.budget - spent) * 100) / 100;
}

function fmt(val) {
  const abs = Math.abs(val).toFixed(2);
  return (val < 0 ? '-' : '') + '£' + abs;
}

// ── MONTH ROLLOVER ──
function checkRollover() {
  const pk = periodKey();
  if (data.lastCheckedPeriod === pk) return;
  const prevStart = getPrevPeriodStart();
  const prevPk = periodKey(prevStart);
  if (data.lastCheckedPeriod && data.lastCheckedPeriod !== pk) {
    const prevEntries = entriesForPeriod(prevPk);
    const prevSpent = prevEntries.reduce((s,e) => s + e.amount, 0);
    const prevRemaining = Math.round((data.budget - prevSpent) * 100) / 100;
    if (prevRemaining < 0) {
      const overspend = Math.abs(prevRemaining);
      const now = new Date();
      const dateStr = now.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
      const adjEntry = {
        id: Date.now(),
        period: pk,
        date: dateStr,
        desc: 'Overspend from ' + periodLabel(prevStart),
        amount: Math.round(overspend * 100) / 100,
        remaining: Math.round((data.budget - overspend) * 100) / 100,
        isAdjustment: true
      };
      data.entries.push(adjEntry);
    }
  }
  data.lastCheckedPeriod = pk;
  save();
}

// ── MIGRATION: tag old entries that used 'month' key ──
function migrateEntryPeriods() {
  let changed = false;
  data.entries.forEach(e => {
    if (!e.period && e.month) {
      // Old month format was YYYY-MM, map to YYYY-MM-01
      e.period = e.month + '-01';
      changed = true;
    }
  });
  if (changed) save();
}

// ── RENDER ──
function renderMain() {
  document.getElementById('month-label').textContent = periodLabel();
  const rem = calcRemaining();
  const el = document.getElementById('remaining-display');
  el.textContent = fmt(rem);
  el.className = 'remaining-value' + (rem < 0 ? ' negative' : '');
  const pct = data.budget > 0 ? Math.max(0, Math.min(100, (rem / data.budget) * 100)) : 0;
  const pf = document.getElementById('progress-fill');
  pf.style.width = pct + '%';
  pf.className = 'progress-fill' + (rem < 0 ? ' danger' : '');
  if (data.budget > 0) {
    const spent = data.budget - rem;
    document.getElementById('remaining-sub').textContent = 'remaining · £' + Math.abs(spent).toFixed(2) + ' spent';
  } else {
    document.getElementById('remaining-sub').textContent = 'remaining';
  }
}

function renderSettings() {
  document.getElementById('budget-input').value = data.budget > 0 ? data.budget : '';
  document.getElementById('reset-day-input').value = data.resetDay || 1;
  updateResetDayInfo();
}

function updateResetDayInfo() {
  const rd = parseInt(document.getElementById('reset-day-input').value) || 1;
  const info = document.getElementById('reset-day-info');
  const next = getPeriodStart();
  const nextEnd = new Date(next);
  nextEnd.setMonth(nextEnd.getMonth()+1);
  nextEnd.setDate(nextEnd.getDate()-1);
  if (rd === 1) {
    info.textContent = 'Resets on the 1st of each month';
  } else {
    info.textContent = 'Current period: ' + next.toLocaleDateString('en-GB', {day:'numeric',month:'short'}) + ' – ' + nextEnd.toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'});
  }
}

document.getElementById('reset-day-input').addEventListener('input', updateResetDayInfo);

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  if (name === 'history') renderHistory();
  if (name === 'main') renderMain();
  if (name === 'settings') renderSettings();
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── ACTIONS ──
function submitPurchase() {
  const desc = document.getElementById('desc-input').value.trim();
  const amt = parseFloat(document.getElementById('amount-input').value);
  if (!desc) { toast('Add a description'); return; }
  if (isNaN(amt) || amt <= 0) { toast('Enter a valid amount'); return; }
  const now = new Date();
  const remBefore = calcRemaining();
  const entry = {
    id: Date.now(),
    period: periodKey(),
    date: now.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }),
    desc,
    amount: Math.round(amt * 100) / 100,
    remaining: Math.round((remBefore - amt) * 100) / 100
  };
  data.entries.push(entry);
  save();
  document.getElementById('desc-input').value = '';
  document.getElementById('amount-input').value = '';
  renderMain();
  toast('Saved');
}

function saveSettings() {
  const bVal = parseFloat(document.getElementById('budget-input').value);
  const rdVal = parseInt(document.getElementById('reset-day-input').value);
  if (isNaN(bVal) || bVal < 0) { toast('Enter a valid budget'); return; }
  if (isNaN(rdVal) || rdVal < 1 || rdVal > 28) { toast('Reset day must be 1–28'); return; }
  data.budget = Math.round(bVal * 100) / 100;
  data.resetDay = rdVal;
  // Reset the period check so rollover re-evaluates with new reset day
  data.lastCheckedPeriod = '';
  recalcRemaining();
  save();
  checkRollover();
  renderMain();
  toast('Settings saved');
}

function recalcRemaining() {
  let running = data.budget;
  const sorted = [...data.entries].sort((a,b) => a.id - b.id);
  sorted.forEach(e => {
    running = Math.round((running - e.amount) * 100) / 100;
    e.remaining = running;
  });
}

function renderHistory() {
  const list = document.getElementById('history-list');
  const all = [...data.entries].reverse();
  if (!all.length) {
    list.innerHTML = '<div class="empty-state">No purchases yet.<br>Add your first one from the main screen.</div>';
    return;
  }
  list.innerHTML = all.map(e => `
    <div class="history-item" id="item-${e.id}">
      <div class="hi-row1">
        <span class="hi-desc" style="${e.isAdjustment ? 'color:var(--danger);' : ''}">${escHtml(e.desc)}</span>
        <span class="hi-amount">-£${e.amount.toFixed(2)}</span>
      </div>
      <div class="hi-row2">
        <span class="hi-date">${e.date}</span>
        <span class="hi-left">${fmt(e.remaining)} left</span>
      </div>
      <div class="hi-actions">
        ${e.isAdjustment ? '' : `<button class="hi-action-btn" onclick="startEdit(${e.id})">Edit</button>`}
        <button class="hi-action-btn del" onclick="deleteEntry(${e.id})">Delete</button>
      </div>
      <div class="edit-form" id="edit-${e.id}">
        <input type="text" id="ed-desc-${e.id}" value="${escHtml(e.desc)}" />
        <input type="number" id="ed-amt-${e.id}" value="${e.amount}" step="0.01" inputmode="decimal" />
        <div class="edit-form-btns">
          <button class="btn-outline" onclick="saveEdit(${e.id})">Save</button>
          <button class="btn-outline" onclick="cancelEdit(${e.id})">Cancel</button>
        </div>
      </div>
    </div>
  `).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function startEdit(id) { document.getElementById('edit-'+id).style.display = 'block'; }
function cancelEdit(id) { document.getElementById('edit-'+id).style.display = 'none'; }

function saveEdit(id) {
  const idx = data.entries.findIndex(e => e.id === id);
  if (idx === -1) return;
  const nd = document.getElementById('ed-desc-'+id).value.trim();
  const na = parseFloat(document.getElementById('ed-amt-'+id).value);
  if (!nd || isNaN(na) || na <= 0) { toast('Invalid values'); return; }
  data.entries[idx].desc = nd;
  data.entries[idx].amount = Math.round(na * 100) / 100;
  recalcRemaining();
  save();
  renderHistory();
  toast('Updated');
}

function deleteEntry(id) {
  data.entries = data.entries.filter(e => e.id !== id);
  recalcRemaining();
  save();
  renderHistory();
  toast('Deleted');
}

// ── INIT ──
load();
migrateEntryPeriods();
checkRollover();
renderMain();
</script>
</body>
</html>
