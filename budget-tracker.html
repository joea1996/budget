<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Budget">
<meta name="theme-color" content="#0f0f0f">
<title>Budget</title>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222222;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0ede8;
    --text2: #888880;
    --text3: #555550;
    --accent: #c8f060;
    --accent-dark: #8faa3a;
    --danger: #ff6b6b;
    --radius: 14px;
    --radius-sm: 9px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif; overscroll-behavior: none; }
  body { display: flex; flex-direction: column; }

  .screen { display: none; flex-direction: column; height: 100%; overflow: hidden; }
  .screen.active { display: flex; }

  /* MAIN SCREEN */
  .main-top {
    flex: 0 0 auto;
    padding: 60px 24px 28px;
    text-align: center;
  }
  .month-label {
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .remaining-value {
    font-size: 56px;
    font-weight: 300;
    letter-spacing: -0.03em;
    line-height: 1;
    color: var(--text);
    transition: color 0.3s;
  }
  .remaining-value.negative { color: var(--danger); }
  .remaining-sub {
    font-size: 13px;
    color: var(--text3);
    margin-top: 8px;
  }

  .progress-bar-wrap {
    padding: 0 24px 28px;
  }
  .progress-bg {
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s ease;
  }
  .progress-fill.danger { background: var(--danger); }

  .form-area {
    flex: 1 1 auto;
    overflow-y: auto;
    padding: 0 20px 20px;
  }
  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 12px;
  }
  .field-label {
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  input[type="text"], input[type="number"] {
    width: 100%;
    background: var(--surface2);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 17px;
    padding: 12px 14px;
    outline: none;
    font-family: inherit;
    -webkit-appearance: none;
    appearance: none;
  }
  input[type="number"] { font-variant-numeric: tabular-nums; }
  input::placeholder { color: var(--text3); }
  input:focus { border-color: var(--accent); }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .btn-submit {
    width: 100%;
    padding: 16px;
    background: var(--accent);
    color: #0f0f0f;
    font-size: 16px;
    font-weight: 600;
    font-family: inherit;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    margin-bottom: 10px;
    letter-spacing: 0.01em;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn-submit:active { opacity: 0.85; transform: scale(0.98); }
  .btn-outline {
    width: 100%;
    padding: 14px;
    background: transparent;
    color: var(--text2);
    font-size: 15px;
    font-family: inherit;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  .btn-outline:active { background: var(--surface); transform: scale(0.98); }

  .settings-section {
    margin-top: 6px;
  }
  .settings-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 14px 0;
    border-bottom: 0.5px solid var(--border);
  }
  .settings-row:last-child { border-bottom: none; }
  .settings-row-label { font-size: 14px; color: var(--text2); }
  .settings-row input { width: 130px; text-align: right; font-size: 15px; }
  .btn-save-budget {
    width: 100%;
    padding: 12px;
    background: var(--surface2);
    color: var(--accent);
    font-size: 14px;
    font-family: inherit;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    cursor: pointer;
    margin-top: 14px;
    transition: opacity 0.15s;
  }
  .btn-save-budget:active { opacity: 0.7; }

  /* HISTORY SCREEN */
  .history-header {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 58px 20px 16px;
    border-bottom: 0.5px solid var(--border);
  }
  .history-title { font-size: 20px; font-weight: 500; }
  .back-btn {
    font-size: 15px;
    color: var(--accent);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 0;
    font-family: inherit;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .history-list { flex: 1 1 auto; overflow-y: auto; padding: 0 20px 40px; }
  .history-item {
    padding: 14px 0;
    border-bottom: 0.5px solid var(--border);
  }
  .hi-row1 { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
  .hi-desc { font-size: 15px; font-weight: 500; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .hi-amount { font-size: 15px; font-weight: 500; color: var(--danger); white-space: nowrap; }
  .hi-row2 { display: flex; justify-content: space-between; margin-top: 4px; }
  .hi-date { font-size: 12px; color: var(--text3); }
  .hi-left { font-size: 12px; color: var(--text2); }
  .hi-actions { display: flex; gap: 8px; margin-top: 8px; }
  .hi-action-btn {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 20px;
    background: var(--surface2);
    border: 0.5px solid var(--border2);
    color: var(--text2);
    cursor: pointer;
    font-family: inherit;
    transition: opacity 0.15s;
  }
  .hi-action-btn.del { color: var(--danger); border-color: rgba(255,107,107,0.3); }
  .hi-action-btn:active { opacity: 0.6; }
  .edit-form {
    margin-top: 10px;
    padding: 12px;
    background: var(--surface2);
    border-radius: var(--radius-sm);
    display: none;
  }
  .edit-form input { margin-bottom: 8px; font-size: 15px; }
  .edit-form-btns { display: flex; gap: 8px; }
  .edit-form-btns button { flex: 1; }
  .empty-state { text-align: center; color: var(--text3); font-size: 14px; padding: 60px 0; line-height: 1.6; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--surface);
    border: 0.5px solid var(--border2);
    border-radius: 24px;
    padding: 9px 18px;
    font-size: 13px;
    color: var(--text2);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    white-space: nowrap;
    z-index: 99;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- MAIN SCREEN -->
<div id="screen-main" class="screen active">
  <div class="main-top">
    <div class="month-label" id="month-label">May 2025</div>
    <div class="remaining-value" id="remaining-display">£0.00</div>
    <div class="remaining-sub" id="remaining-sub">remaining</div>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bg"><div class="progress-fill" id="progress-fill" style="width:100%"></div></div>
  </div>
  <div class="form-area">
    <div class="card">
      <div class="field-label">Description</div>
      <input type="text" id="desc-input" placeholder="e.g. Coffee, Groceries…" autocomplete="off" />
    </div>
    <div class="card">
      <div class="field-label">Value (£)</div>
      <input type="number" id="amount-input" placeholder="0.00" min="0" step="0.01" inputmode="decimal" />
    </div>
    <button class="btn-submit" onclick="submitPurchase()">Submit</button>
    <button class="btn-outline" onclick="showScreen('history')">History</button>

    <div class="card settings-section" style="margin-top:18px;">
      <div class="field-label" style="margin-bottom:0;">Settings</div>
      <div class="settings-row">
        <span class="settings-row-label">Monthly budget (£)</span>
        <input type="number" id="budget-input" placeholder="e.g. 500" min="0" step="0.01" inputmode="decimal" />
      </div>
      <button class="btn-save-budget" onclick="saveBudget()">Save budget</button>
    </div>
  </div>
</div>

<!-- HISTORY SCREEN -->
<div id="screen-history" class="screen">
  <div class="history-header">
    <button class="back-btn" onclick="showScreen('main')">← Back</button>
    <div class="history-title">History</div>
    <div style="width:50px;"></div>
  </div>
  <div class="history-list" id="history-list"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const KEY = 'budget_v2';
let data = { budget: 0, entries: [] };

function load() {
  try { const r = localStorage.getItem(KEY); if (r) data = JSON.parse(r); } catch(e){}
}
function save() {
  try { localStorage.setItem(KEY, JSON.stringify(data)); } catch(e){}
}

function monthKey() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
}
function monthLabel() {
  return new Date().toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
}
function currentEntries() {
  return data.entries.filter(e => e.month === monthKey());
}
function calcRemaining() {
  const spent = currentEntries().reduce((s,e) => s + e.amount, 0);
  return Math.round((data.budget - spent) * 100) / 100;
}
function fmt(val) {
  const abs = Math.abs(val).toFixed(2);
  return (val < 0 ? '-' : '') + '£' + abs;
}

function renderMain() {
  document.getElementById('month-label').textContent = monthLabel();
  const rem = calcRemaining();
  const el = document.getElementById('remaining-display');
  el.textContent = fmt(rem);
  el.className = 'remaining-value' + (rem < 0 ? ' negative' : '');
  const pct = data.budget > 0 ? Math.max(0, Math.min(100, (rem / data.budget) * 100)) : 0;
  const pf = document.getElementById('progress-fill');
  pf.style.width = pct + '%';
  pf.className = 'progress-fill' + (rem < 0 ? ' danger' : '');
  if (data.budget > 0) {
    const spent = data.budget - rem;
    document.getElementById('remaining-sub').textContent = 'remaining · £' + Math.abs(spent).toFixed(2) + ' spent';
  } else {
    document.getElementById('remaining-sub').textContent = 'remaining';
  }
  if (data.budget > 0) document.getElementById('budget-input').value = data.budget;
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  if (name === 'history') renderHistory();
  if (name === 'main') renderMain();
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function submitPurchase() {
  const desc = document.getElementById('desc-input').value.trim();
  const amt = parseFloat(document.getElementById('amount-input').value);
  if (!desc) { toast('Add a description'); return; }
  if (isNaN(amt) || amt <= 0) { toast('Enter a valid amount'); return; }
  const now = new Date();
  const remBefore = calcRemaining();
  const entry = {
    id: Date.now(),
    month: monthKey(),
    date: now.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }),
    desc,
    amount: Math.round(amt * 100) / 100,
    remaining: Math.round((remBefore - amt) * 100) / 100
  };
  data.entries.push(entry);
  save();
  document.getElementById('desc-input').value = '';
  document.getElementById('amount-input').value = '';
  renderMain();
  toast('Saved');
}

function saveBudget() {
  const val = parseFloat(document.getElementById('budget-input').value);
  if (isNaN(val) || val < 0) { toast('Enter a valid budget'); return; }
  data.budget = Math.round(val * 100) / 100;
  recalcRemaining();
  save();
  renderMain();
  toast('Budget saved');
}

function recalcRemaining() {
  let running = data.budget;
  const sorted = [...data.entries].sort((a,b) => a.id - b.id);
  sorted.forEach(e => {
    running = Math.round((running - e.amount) * 100) / 100;
    e.remaining = running;
  });
}

function renderHistory() {
  const list = document.getElementById('history-list');
  const all = [...data.entries].reverse();
  if (!all.length) {
    list.innerHTML = '<div class="empty-state">No purchases yet.<br>Add your first one from the main screen.</div>';
    return;
  }
  list.innerHTML = all.map(e => `
    <div class="history-item" id="item-${e.id}">
      <div class="hi-row1">
        <span class="hi-desc">${escHtml(e.desc)}</span>
        <span class="hi-amount">-£${e.amount.toFixed(2)}</span>
      </div>
      <div class="hi-row2">
        <span class="hi-date">${e.date}</span>
        <span class="hi-left">${fmt(e.remaining)} left</span>
      </div>
      <div class="hi-actions">
        <button class="hi-action-btn" onclick="startEdit(${e.id})">Edit</button>
        <button class="hi-action-btn del" onclick="deleteEntry(${e.id})">Delete</button>
      </div>
      <div class="edit-form" id="edit-${e.id}">
        <input type="text" id="ed-desc-${e.id}" value="${escHtml(e.desc)}" />
        <input type="number" id="ed-amt-${e.id}" value="${e.amount}" step="0.01" inputmode="decimal" />
        <div class="edit-form-btns">
          <button class="btn-outline" onclick="saveEdit(${e.id})">Save</button>
          <button class="btn-outline" onclick="cancelEdit(${e.id})">Cancel</button>
        </div>
      </div>
    </div>
  `).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function startEdit(id) { document.getElementById('edit-'+id).style.display = 'block'; }
function cancelEdit(id) { document.getElementById('edit-'+id).style.display = 'none'; }

function saveEdit(id) {
  const idx = data.entries.findIndex(e => e.id === id);
  if (idx === -1) return;
  const nd = document.getElementById('ed-desc-'+id).value.trim();
  const na = parseFloat(document.getElementById('ed-amt-'+id).value);
  if (!nd || isNaN(na) || na <= 0) { toast('Invalid values'); return; }
  data.entries[idx].desc = nd;
  data.entries[idx].amount = Math.round(na * 100) / 100;
  recalcRemaining();
  save();
  renderHistory();
  toast('Updated');
}

function deleteEntry(id) {
  data.entries = data.entries.filter(e => e.id !== id);
  recalcRemaining();
  save();
  renderHistory();
  toast('Deleted');
}

load();
renderMain();
</script>
</body>
</html>
